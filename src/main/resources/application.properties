# Spring Boot application properties
server.port=8080

# --- Profile Configuration ---
spring.profiles.active=dev

# --- Database Configuration (H2 for dev) ---
spring.datasource.url=jdbc:h2:mem:farmcitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- JWT Configuration ---
jwt.secret=${JWT_SECRET_KEY:defaultSecretKeyThatShouldBeChangedInProduction}
jwt.expiration=86400000

# --- Stripe Configuration ---
stripe.api-key=${STRIPE_API_KEY:sk_test_your_stripe_key}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

